# Conexão com o Banco de Dados
spring.datasource.url=jdbc:postgresql://localhost:5432/banco_db
spring.datasource.username=root
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate (JPA)
# O 'update' cria as tabelas automaticamente baseado nas nossas classes Entity. 
# (Nota Sênior: Em produção, o Itaú usa ferramentas de Migrations como o Flyway, mas para testes locais o update é perfeito).
spring.jpa.hibernate.ddl-auto=update

# Mostra as queries SQL no console para vermos a mágica acontecendo
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações do Kafka
# Se a variável KAFKA_URL existir (no Docker/K8s), ele usa ela. Se não (no IntelliJ), usa localhost:9092
spring.kafka.bootstrap-servers=${KAFKA_URL:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer