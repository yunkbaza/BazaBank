# ==========================================
# 1. CONEXÃO COM A BASE DE DADOS (CLOUDBUDDY)
# ==========================================
# O Spring lerá a DATABASE_URL do Render. Se não houver, usa o localhost.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/banco_db}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

# O Render define a porta automaticamente através da variável PORT
server.port=${PORT:8081}

# ==========================================
# 2. CONFIGURAÇÕES DO HIBERNATE (JPA)
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Garante que o banco seja populado corretamente
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ==========================================
# 3. CONFIGURAÇÕES DO KAFKA (NUVEM & SEGURANÇA)
# ==========================================
spring.kafka.bootstrap-servers=${KAFKA_URL:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Configurações para Kafka com autenticação (Upstash/Confluent)
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=${KAFKA_JAAS_CONFIG:}

# ==========================================
# 4. SEGURANÇA E JWT
# ==========================================
# Nunca deixe a Secret exposta no código. Use a variável de ambiente no Render.
api.security.token.secret=${JWT_SECRET:eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30}

# ==========================================
# 5. CONFIGURAÇÕES DO REDIS (IDEMPOTÊNCIA)
# ==========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ==========================================
# 6. OBSERVABILIDADE (PROMETHEUS & HEALTH)
# ==========================================
spring.application.name=motor-app
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# ==========================================
# 7. CIRCUIT BREAKER (RESILIENCE4J)
# ==========================================
# Janela de análise de 10 chamadas
resilience4j.circuitbreaker.instances.extratoCB.sliding-window-size=10
# Se 50% falharem, o circuito abre
resilience4j.circuitbreaker.instances.extratoCB.failure-rate-threshold=50
# Tempo de espera em estado aberto (10 segundos)
resilience4j.circuitbreaker.instances.extratoCB.wait-duration-in-open-state=10s
# Teste de recuperação com 3 chamadas
resilience4j.circuitbreaker.instances.extratoCB.permitted-number-of-calls-in-half-open-state=3